# Order matters: first match wins. Signup must not fall through to the SPA.
[[redirects]]
  from = "/signup"
  to = "/signup/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/signup/"
  to = "/signup/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
