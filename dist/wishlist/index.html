<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Open Wishlist</title>

  <style>
    body {
      font-family: system-ui, sans-serif;
      padding: 1.25rem;
      max-width: 28rem;
      margin: 0 auto;
    }

    a {
      color: #0d47a1;
      word-break: break-all;
    }

    .muted {
      color: #555;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

<p id="status">Opening the ADK app…</p>

<p id="fallback" class="muted" hidden>
  If nothing happens, open:
  <a id="native" href="#">Open in ADK app</a>
</p>

<script>
(function () {

  // ====================================================
  // PRODUCTION MODE
  // ====================================================
  var IS_PRODUCTION = false;

  // ====================================================
  // GET TOKEN
  // ====================================================
  var token = location.pathname.split('/').pop();

  // ====================================================
  // DEEP LINK
  // ====================================================
  var nativeUrl =
    'adkpartner://open?type=wishlist&token=' +
    encodeURIComponent(token);

  // ====================================================
  // PLAY STORE
  // ====================================================
  var playstore =
    'https://play.google.com/store/apps/details?id=com.example.netshop_flutter';

  // ====================================================
  // FALLBACK BUTTON
  // ====================================================
  var nativeA = document.getElementById('native');

  nativeA.href = nativeUrl;

  nativeA.addEventListener('click', function () {

    window.location.href = nativeUrl;

  });

  // ====================================================
  // OPEN APP
  // ====================================================
  window.location.href = nativeUrl;

  // ====================================================
  // PLAY STORE FALLBACK
  // ====================================================
  if (IS_PRODUCTION) {

    setTimeout(function () {

      window.location.href = playstore;

    }, 2000);

  }

  // ====================================================
  // MANUAL BUTTON
  // ====================================================
  setTimeout(function () {

    document.getElementById('status').textContent =
      'Still here? Tap below to open the app manually.';

    document.getElementById('fallback').hidden = false;

  }, 1500);

})();
</script>

</body>
</html>
